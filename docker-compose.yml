services:
  mongodb:
    image: mongo:7
    container_name: car-rental-db
    ports:
      - "27017:27017"
    # Load sensitive values from .env (not committed)
    env_file:
      - .env
    environment:
      - MONGO_INITDB_ROOT_USERNAME
      - MONGO_INITDB_ROOT_PASSWORD
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: